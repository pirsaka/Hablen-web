<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hablen | Kayıt Ol</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0D1B2A] text-white flex items-center justify-center min-h-screen p-6">
    <div class="bg-[#1B263B] p-10 rounded-3xl shadow-2xl w-full max-w-md border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold uppercase tracking-tighter">HABLEN</h1>
            <p class="text-gray-400 mt-2">Yolculuğun burada başlıyor.</p>
        </div>

        <form class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">E-posta</label>
                <input type="email" placeholder="mail@adresin.com" class="w-full p-4 rounded-xl bg-[#0D1B2A] border border-gray-600 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Şifre</label>
                <input type="password" placeholder="••••••••" class="w-full p-4 rounded-xl bg-[#0D1B2A] border border-gray-600 outline-none">
            </div>
            <button type="button" onclick="window.location.href='test.html'" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold text-lg transition">
                Hesap Oluştur ve Teste Geç
            </button>
        </form>
    </div>
</body>
</html>
