<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hablen | Uygunluk Testi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0D1B2A; color: #E0E1DD; }
        .card { background-color: #1B263B; border: 1px solid #415A77; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-2xl mx-auto mt-10">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-white">Hablen Uygunluk Testi</h1>
            <p class="text-gray-400 mt-2">Karakterine en uygun işi bulmamıza yardım et.</p>
        </div>

        <div id="test-container" class="card p-8 rounded-2xl shadow-xl">
            <div id="question-area">
                <h2 id="question-text" class="text-xl font-semibold mb-6 italic">Yükleniyor...</h2>
                <div id="options" class="space-y-4">
                    </div>
            </div>
            <div id="result-area" class="hidden text-center">
                <h2 class="text-2xl font-bold text-green-400 mb-4">Test Tamamlandı!</h2>
                <p id="final-score" class="text-lg text-gray-300 mb-6"></p>
                <button onclick="location.href='index.html'" class="bg-blue-600 px-6 py-2 rounded-lg font-bold">Ana Sayfaya Dön</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Karmaşık bir problemle karşılaştığında nasıl ilerlersin?", a: ["Yalnız düşünürüm", "Ekibimle konuşurum"] },
            { q: "Düzenli bir ofis mi, yoksa her gün değişen bir ortam mı?", a: ["Düzenli Ofis", "Dinamik/Değişken Ortam"] },
            { q: "Kararları sen mi alırsın, yoksa alınan kararı mı uygularsın?", a: ["Liderlik Ederim", "Uygulamaya Odaklanırım"] }
        ];

        let currentIdx = 0;

        function showQuestion() {
            if(currentIdx < questions.length) {
                document.getElementById('question-text').innerText = questions[currentIdx].q;
                const optionsDiv = document.getElementById('options');
                optionsDiv.innerHTML = '';
                questions[currentIdx].a.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-4 rounded-xl border border-gray-600 hover:bg-blue-900 transition";
                    btn.innerText = opt;
                    btn.onclick = () => { currentIdx++; showQuestion(); };
                    optionsDiv.appendChild(btn);
                });
            } else {
                document.getElementById('question-area').classList.add('hidden');
                document.getElementById('result-area').classList.remove('hidden');
                document.getElementById('final-score').innerText = "Profilin analiz edildi. Uygun ilanlar listelenecek!";
            }
        }
        showQuestion();
    </script>
</body>
</html>
