<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hablen | Yetenek Analizi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: #0D1B2A; }</style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-6">
    <div id="test-container" class="max-w-2xl w-full bg-[#1B263B] p-10 rounded-3xl shadow-2xl border border-gray-700 text-center">
        <div id="question-area">
            <h1 class="text-xl font-black text-blue-500 mb-6 uppercase italic">Hablen Analiz</h1>
            <h2 id="question-text" class="text-2xl font-bold mb-8">Yükleniyor...</h2>
            <div id="options" class="grid grid-cols-1 gap-4"></div>
        </div>
        <div id="result-area" class="hidden">
            <div class="text-6xl mb-4 animate-bounce">🚀</div>
            <h2 class="text-3xl font-black mb-4">ANALİZ TAMAMLANDI</h2>
            <p class="text-gray-400 mb-6">Yeteneklerin profilinde listeleniyor...</p>
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500 mx-auto"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hhxhcbtahzinrbqxgusz.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_vavMMathuMNaoCi2v_epbA_P7wSnvvO';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const questions = [
            { q: "Hangi alan seni daha çok heyecanlandırır?", options: ["Kod Yazmak", "Tasarım Yapmak", "Satış/Pazarlama", "Yönetim"] },
            { q: "Nasıl çalışmayı tercih edersin?", options: ["Tamamen Uzaktan", "Ofis Ortamı", "Hibrit", "Esnek Saatler"] }
        ];

        let currentQuestion = 0;

        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').innerText = q.q;
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full p-4 rounded-xl bg-[#0D1B2A] border-2 border-gray-800 font-bold hover:border-blue-500 transition";
                btn.innerText = opt;
                btn.onclick = () => { if(currentQuestion < questions.length - 1) { currentQuestion++; loadQuestion(); } else { finishTest(); } };
                optionsDiv.appendChild(btn);
            });
        }

        async function finishTest() {
            document.getElementById('question-area').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');

            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                // VERİ KAYDETME: 'rects' tablosunu güncelliyoruz
                await supabaseClient.from('rects').update({ test_completed: true, result_category: 'Yazılım & Teknoloji' }).eq('id', user.id);
            }
            setTimeout(() => { window.location.href = 'profile.html'; }, 2000);
        }
        loadQuestion();
    </script>
</body>
</html>
