<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hablen | Admin Denetimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0f1a; color: white; }
        .admin-card { background: #161b22; border: 1px solid #30363d; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black italic uppercase text-white">Denetim <span class="text-yellow-500">Merkezi</span></h1>
            <button onclick="window.location.href='profile.html'" class="bg-gray-800 px-4 py-2 rounded-xl text-[10px] font-black uppercase">← Siteye Dön</button>
        </div>

        <div id="adminList" class="grid gap-6">
            <p class="text-gray-500 italic">Yükleniyor...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hhxhcbtahzinrbqxgusz.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_vavMMathuMNaoCi2v_epbA_P7wSnvvO';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const ADMIN_ID = "438fb710-cd9b-4761-82be-2a2b84bdb8c4"; 

        async function loadPendingJobs() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user || user.id !== ADMIN_ID) {
                alert("Yetkisiz Erişim!");
                window.location.href = 'profile.html';
                return;
            }

            const { data: jobs, error } = await supabaseClient
                .from('jobs')
                .select('*')
                .eq('status', 'pending')
                .order('created_at', { ascending: false });

            const list = document.getElementById('adminList');
            if (!jobs || jobs.length === 0) {
                list.innerHTML = '<p class="text-gray-600 font-black italic uppercase text-center py-20 border-2 border-dashed border-gray-800 rounded-[40px]">Onaylanacak ilan yok.</p>';
                return;
            }

            list.innerHTML = '';
            jobs.forEach(job => {
                list.innerHTML += `
                    <div class="admin-card p-8 rounded-[32px] flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                        <div class="flex-1">
                            <h3 class="font-black text-xl uppercase italic text-white mb-2">${job.title}</h3>
                            <p class="text-gray-400 text-sm mb-4">${job.description}</p>
                            <p class="text-yellow-500 font-black">${job.price}</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="approveJob('${job.id}')" class="bg-green-600 hover:bg-green-500 text-white px-6 py-3 rounded-2xl text-xs font-black uppercase">Yayınla ✅</button>
                            <button onclick="rejectJob('${job.id}')" class="bg-red-600 hover:bg-red-500 text-white px-6 py-3 rounded-2xl text-xs font-black uppercase">Reddet</button>
                        </div>
                    </div>
                `;
            });
        }

        // YAYINLA FONKSİYONU
        window.approveJob = async function(id) {
            console.log("Onaylanıyor ID:", id);
            const { error } = await supabaseClient
                .from('jobs')
                .update({ status: 'approved' })
                .eq('id', id);

            if (error) {
                console.error("Hata:", error);
                alert("Hata oluştu: " + error.message);
            } else {
                alert("İlan başarıyla onaylandı ve yayına alındı! 🚀");
                loadPendingJobs();
            }
        }

        // REDDET FONKSİYONU
        window.rejectJob = async function(id) {
            if(confirm("Bu ilanı silmek istediğine emin misin?")) {
                const { error } = await supabaseClient
                    .from('jobs')
                    .delete()
                    .eq('id', id);

                if (error) {
                    console.error("Hata:", error);
                    alert("Silme hatası: " + error.message);
                } else {
                    alert("İlan reddedildi ve silindi.");
                    loadPendingJobs();
                }
            }
        }

        loadPendingJobs();
    </script>
</body>
</html>
