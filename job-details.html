<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hablen | İlan Detayları</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0D1B2A; color: white; }
        .detail-card { 
            background: linear-gradient(145deg, #1B263B, #141E30); 
            border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .btn-gradient {
            background: linear-gradient(90deg, #22c55e, #16a34a);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="p-6 flex justify-between items-center border-b border-gray-800 bg-[#1B263B] sticky top-0 z-50">
        <div onclick="window.location.href='profile.html'" class="text-2xl font-black uppercase italic cursor-pointer tracking-tighter">HABLEN</div>
        <button onclick="window.location.href='profile.html'" class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 hover:text-white transition">← Geri Dön</button>
    </nav>

    <main class="max-w-3xl mx-auto p-6 mt-10">
        <div id="loading" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-blue-500 mb-4"></div>
            <p class="text-gray-500 font-bold italic uppercase text-xs tracking-widest">İlan Getiriliyor...</p>
        </div>

        <div id="jobDetail" class="hidden">
            <div class="detail-card p-8 md:p-12 rounded-[40px] relative overflow-hidden">
                
                <div class="flex justify-between items-center mb-10">
                    <span id="category" class="bg-blue-500/10 text-blue-400 px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-blue-500/20">Kategori</span>
                    <span id="date" class="text-gray-500 text-[10px] font-bold uppercase italic opacity-60">00.00.0000</span>
                </div>

                <h1 id="title" class="text-4xl md:text-5xl font-black uppercase italic leading-[0.9] mb-8 tracking-tighter text-white">İlan Başlığı</h1>
                
                <div class="bg-black/20 rounded-[30px] p-6 md:p-8 mb-10">
                    <p class="text-gray-500 text-[10px] font-black uppercase mb-4 tracking-widest opacity-50">İş Detayları</p>
                    <p id="description" class="text-gray-300 leading-relaxed font-medium text-sm md:text-base whitespace-pre-line">
                        Yükleniyor...
                    </p>
                </div>

                <div class="flex flex-col md:flex-row justify-between items-end md:items-center gap-8 pt-6 border-t border-white/5">
                    <div class="w-full md:w-auto">
                        <p class="text-gray-500 text-[10px] font-black uppercase tracking-[0.2em] mb-1">Teklif Edilen Bütçe</p>
                        <p id="price" class="text-4xl font-black text-white italic tracking-tighter">0.00 TL</p>
                    </div>
                    
                    <a id="applyBtn" href="#" target="_blank" class="w-full md:w-auto btn-gradient text-white px-10 py-5 rounded-[24px] font-[900] uppercase italic transition text-center text-sm shadow-xl flex items-center justify-center gap-3">
                        <span>Hemen İletişime Geç</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                        </svg>
                    </a>
                </div>
            </div>

            <p class="text-center mt-8 text-gray-600 text-[10px] font-bold uppercase tracking-widest italic px-10">
                ⚠️ Güvenliğiniz için ödemelerinizi iş tesliminde yapmaya özen gösterin.
            </p>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://hhxhcbtahzinrbqxgusz.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_vavMMathuMNaoCi2v_epbA_P7wSnvvO';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');

        async function loadJob() {
            if(!jobId) {
                window.location.href = 'profile.html';
                return;
            }

            const { data: job, error } = await supabaseClient
                .from('jobs')
                .select('*')
                .eq('id', jobId)
                .single();

            if(error || !job) {
                console.error("Hata:", error);
                alert("İlan yüklenirken bir sorun oluştu veya ilan kaldırıldı.");
                window.location.href = 'profile.html';
                return;
            }

            // HTML elemanlarını güncelle
            document.getElementById('title').innerText = job.title;
            document.getElementById('description').innerText = job.description;
            document.getElementById('price').innerText = job.price;
            document.getElementById('category').innerText = job.category;
            document.getElementById('date').innerText = new Date(job.created_at).toLocaleDateString('tr-TR');
            
            // Başvuru butonu kontrolü
            const applyBtn = document.getElementById('applyBtn');
            if(job.contact_link) {
                // Linkin başına https eklenmemişse ekleyelim
                let link = job.contact_link;
                if (!link.startsWith('http')) link = 'https://' + link;
                applyBtn.href = link;
            } else {
                applyBtn.innerHTML = "İLETİŞİM BİLGİSİ YOK";
                applyBtn.classList.replace('btn-gradient', 'bg-gray-800');
                applyBtn.style.pointerEvents = 'none';
            }

            // Arayüzü göster
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('jobDetail').classList.remove('hidden');
        }

        loadJob();
    </script>
</body>
</html>
