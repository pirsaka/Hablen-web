        body { font-family: 'Inter', sans-serif; background: #0D1B2A; }
        .input-style { background: #1B263B; border: 2px solid #2D3748; outline: none; transition: all 0.3s; }
        .input-style:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

<body class="text-white min-h-screen flex flex-col">

    <nav class="p-6 flex justify-between items-center border-b border-gray-800 bg-[#1B263B]">
        <a href="profile.html" class="text-2xl font-black tracking-tighter uppercase italic hover:text-blue-400 transition">
            HABLEN
        </a>
        <a href="profile.html" class="text-gray-400 hover:text-white font-bold text-sm">Vazgeç</a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-2xl w-full bg-[#1B263B] p-8 md:p-12 rounded-3xl shadow-2xl border border-gray-800">
            <h1 class="text-3xl font-black mb-2 uppercase tracking-tight text-blue-500">Yeni İlan Oluştur</h1>
            <p class="text-gray-400 mb-8 font-medium italic text-sm">Dijital dünyadaki yetenekleri yakala!</p>

            <form id="jobForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-500 mb-2">İlan Başlığı</label>
                    <input type="text" id="jobTitle" required placeholder="Örn: Discord Moderatörü Aranıyor" class="w-full p-4 rounded-xl input-style text-white font-bold">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-black uppercase tracking-widest text-gray-500 mb-2">Kategori</label>
                        <select id="jobCategory" class="w-full p-4 rounded-xl input-style text-white font-bold appearance-none">
                            <option value="Discord">💬 Discord</option>
                            <option value="Gaming">🎮 Gaming / Oyun</option>
                            <option value="Software">💻 Yazılım / Teknoloji</option>
                            <option value="Editing">🎥 Yayın / Editörlük</option>
                            <option value="Other">✨ Diğer</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-black uppercase tracking-widest text-gray-500 mb-2">Ücret / Maaş</label>
                        <input type="text" id="jobPrice" required placeholder="Örn: 5.000 TL / Ay" class="w-full p-4 rounded-xl input-style text-white font-bold">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-500 mb-2">Detaylı Açıklama</label>
                    <textarea id="jobDesc" rows="4" required placeholder="İşin detaylarını ve aradığın kriterleri buraya yaz..." class="w-full p-4 rounded-xl input-style text-white font-medium"></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-black text-xl transition transform active:scale-95 shadow-xl uppercase tracking-widest">
                    İlanı Yayınla 🚀
                </button>
            </form>
        </div>
    </main>

</body>
