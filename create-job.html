<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hablen | İlan Oluştur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0D1B2A; color: white; }
        .input-field { background: #1B263B; border: 1px solid #2D3748; transition: 0.3s; }
        .input-field:focus { border-color: #3b82f6; outline: none; }
        .success-badge { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); color: #4ade80; }
    </style>
</head>
<body class="min-h-screen p-6 pb-20">

    <nav class="max-w-3xl mx-auto flex justify-between items-center mb-12">
        <div onclick="window.location.href='profile.html'" class="text-2xl font-black uppercase italic cursor-pointer tracking-tighter">HABLEN</div>
        <button onclick="window.location.href='profile.html'" class="text-[10px] font-black uppercase tracking-widest text-gray-500 hover:text-white transition">Vazgeç</button>
    </nav>

    <main class="max-w-2xl mx-auto">
        <header class="mb-10 text-center md:text-left">
            <h1 class="text-4xl font-[900] uppercase italic tracking-tighter text-white">İlan <span class="text-blue-500">Yayınla</span></h1>
            <p class="text-gray-500 text-[10px] font-bold uppercase mt-2 tracking-[0.2em] italic">Hızlı, Kolay ve Onaylı</p>
        </header>

        <form id="jobForm" class="space-y-8">
            <div>
                <label class="block text-gray-400 text-[10px] font-black uppercase mb-3 tracking-widest">İş Başlığı</label>
                <input type="text" id="title" placeholder="Örn: Profesyonel Video Kurgu" class="input-field w-full p-5 rounded-[20px] text-white" required>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-gray-400 text-[10px] font-black uppercase mb-3 tracking-widest">Ücret</label>
                    <input type="text" id="price" placeholder="Örn: 500 TL" class="input-field w-full p-5 rounded-[20px] text-white" required>
                </div>
                <div>
                    <label class="block text-gray-400 text-[10px] font-black uppercase mb-3 tracking-widest">Kategori</label>
                    <select id="category" class="input-field w-full p-5 rounded-[20px] text-white appearance-none cursor-pointer">
                        <option value="Dijital">Dijital Hizmet</option>
                        <option value="Yazılım">Yazılım</option>
                        <option value="Tasarım">Tasarım</option>
                    </select>
                </div>
            </div>

            <div class="space-y-3">
                <label class="block text-green-500 text-[10px] font-black uppercase tracking-widest">WhatsApp Numaranız</label>
                <div class="relative">
                    <input type="text" id="phone_input" placeholder="5XXXXXXXXX" maxlength="10" class="input-field w-full p-5 rounded-[20px] text-white border-green-500/20 focus:border-green-500 transition" required>
                    <span class="absolute right-5 top-1/2 -translate-y-1/2 text-green-500 font-black text-xs uppercase italic">TR (+90)</span>
                </div>
                
                <div id="linkPreview" class="hidden success-badge p-4 rounded-2xl flex items-start gap-3">
                    <span class="text-lg">✅</span>
                    <p class="text-[10px] font-medium leading-relaxed">
                        Müşteri size şu mesajla ulaşacak: <br>
                        <span class="italic text-white font-bold">"Merhaba, Hablen'deki ilanınız için yazıyorum. Detayları görüşebilir miyiz?"</span>
                    </p>
                </div>
            </div>

            <div>
                <label class="block text-gray-400 text-[10px] font-black uppercase mb-3 tracking-widest">İş Açıklaması</label>
                <textarea id="description" rows="5" placeholder="İşi detaylandırın..." class="input-field w-full p-5 rounded-[20px] text-white resize-none" required></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-6 rounded-[25px] uppercase italic transition shadow-2xl shadow-blue-900/20 text-lg">
                Onaya Gönder 🚀
            </button>
        </form>
    </main>

    <script>
        const SUPABASE_URL = 'https://hhxhcbtahzinrbqxgusz.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_vavMMathuMNaoCi2v_epbA_P7wSnvvO';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const phoneInput = document.getElementById('phone_input');
        const preview = document.getElementById('linkPreview');

        // Kullanıcı numara yazdıkça kontrol et ve önizleme göster
        phoneInput.addEventListener('input', (e) => {
            const val = e.target.value.replace(/\D/g, ''); // Sadece rakam kalsın
            e.target.value = val;

            if(val.length === 10) {
                preview.classList.remove('hidden');
            } else {
                preview.classList.add('hidden');
            }
        });

        document.getElementById('jobForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "YÜKLENİYOR...";

            const { data: { user } } = await supabaseClient.auth.getUser();

            // 🛠 LİNK OLUŞTURMA SİHİRİ 🛠
            const phone = phoneInput.value;
            const message = encodeURIComponent("Merhaba, Hablen'deki ilanınız için yazıyorum. Detayları görüşebilir miyiz?");
            const finalLink = `https://wa.me/90${phone}?text=${message}`;

            const jobData = {
                user_id: user.id,
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                price: document.getElementById('price').value,
                contact_link: finalLink, // Hazır linki kaydediyoruz
                description: document.getElementById('description').value,
                status: 'pending' 
            };

            const { error } = await supabaseClient.from('jobs').insert([jobData]);

            if (error) {
                alert("Hata: " + error.message);
                btn.disabled = false;
                btn.innerText = "Onaya Gönder 🚀";
            } else {
                alert("Harika! İlanın onaya gönderildi.");
                window.location.href = 'profile.html';
            }
        });
    </script>
</body>
</html>
