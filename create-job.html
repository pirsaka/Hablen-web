<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hablen | İlan Yayınla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0D1B2A; color: white; }
        .input-field { background: #1B263B; border: 1px solid #2D3748; transition: 0.3s; }
        .input-field:focus { border-color: #3b82f6; outline: none; }
        .image-dropzone { border: 2px dashed #2D3748; transition: 0.3s; cursor: pointer; }
        .image-dropzone:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-6 pb-24">

    <nav class="max-w-3xl mx-auto flex justify-between items-center mb-16">
        <div onclick="window.location.href='profile.html'" class="text-2xl font-black uppercase italic tracking-tighter cursor-pointer">HABLEN</div>
        <button onclick="window.location.href='profile.html'" class="text-[10px] font-black uppercase tracking-widest text-gray-500 hover:text-white transition">Vazgeç</button>
    </nav>

    <main class="max-w-xl mx-auto">
        <header class="mb-12">
            <h1 class="text-5xl font-[900] uppercase italic tracking-tighter text-white">İlanını <br><span class="text-blue-500">Görselleştir</span></h1>
            <p class="text-gray-500 text-[10px] font-bold uppercase mt-4 tracking-[0.3em] italic">Fotoğraflı ilanlar daha çok ilgi çeker.</p>
        </header>

        <form id="jobForm" class="space-y-10">
            <div class="space-y-4">
                <label class="block text-gray-400 text-[10px] font-black uppercase tracking-widest">İş Görseli (Zorunlu Değil)</label>
                <input type="file" id="image_input" accept="image/*" class="hidden">
                <label for="image_input" id="dropzone" class="image-dropzone w-full p-10 rounded-[30px] flex flex-col items-center justify-center">
                    <span id="preview_icon" class="text-4xl mb-3">📸</span>
                    <span id="file_name" class="text-[10px] font-black uppercase text-gray-500 italic">Bir fotoğraf seç veya buraya bırak</span>
                    <img id="img_preview" class="hidden w-full h-40 object-cover rounded-2xl mt-2">
                </label>
            </div>

            <div>
                <label class="block text-gray-400 text-[10px] font-black uppercase mb-4 tracking-widest">İşin Başlığı</label>
                <input type="text" id="title" placeholder="Örn: Profesyonel Logo Tasarımı" class="input-field w-full p-6 rounded-[28px] text-white" required>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-gray-400 text-[10px] font-black uppercase mb-4 tracking-widest">Kategori</label>
                    <select id="category" class="input-field w-full p-6 rounded-[28px] text-white appearance-none cursor-pointer font-bold uppercase italic text-xs">
                        <option value="Dijital Hizmet">Dijital Hizmet</option>
                        <option value="İş İlanı">İş İlanı</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-400 text-[10px] font-black uppercase mb-4 tracking-widest">Bütçe / Ücret</label>
                    <input type="text" id="price" placeholder="Örn: 1.000 TL" class="input-field w-full p-6 rounded-[28px] text-white font-bold" required>
                </div>
            </div>

            <div class="space-y-4">
                <label class="block text-green-500 text-[10px] font-black uppercase tracking-widest">WhatsApp Numaranız</label>
                <input type="text" id="phone_num" placeholder="5XXXXXXXXX" maxlength="10" 
                       class="input-field w-full p-6 rounded-[28px] text-white font-black tracking-widest" required>
            </div>

            <div>
                <label class="block text-gray-400 text-[10px] font-black uppercase mb-4 tracking-widest">İş Detayları</label>
                <textarea id="description" rows="5" placeholder="Beklentilerinizi yazın..." 
                          class="input-field w-full p-6 rounded-[28px] text-white resize-none" required></textarea>
            </div>

            <button type="submit" id="submitBtn" 
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-7 rounded-[30px] uppercase italic transition shadow-2xl shadow-blue-900/40 text-lg">
                İlanı Onaya Gönder 🚀
            </button>
        </form>
    </main>

    <script>
        const SUPABASE_URL = 'https://hhxhcbtahzinrbqxgusz.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_vavMMathuMNaoCi2v_epbA_P7wSnvvO';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const imageInput = document.getElementById('image_input');
        const imgPreview = document.getElementById('img_preview');
        const previewIcon = document.getElementById('preview_icon');
        const fileNameLabel = document.getElementById('file_name');

        // Fotoğraf Seçildiğinde Önizleme Göster
        imageInput.onchange = e => {
            const file = e.target.files[0];
            if (file) {
                fileNameLabel.innerText = file.name;
                const reader = new FileReader();
                reader.onload = () => {
                    imgPreview.src = reader.result;
                    imgPreview.classList.remove('hidden');
                    previewIcon.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('jobForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "YÜKLENİYOR...";

            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                
                // 1. FOTOĞRAF YÜKLEME (Varsa)
                let imageUrl = null;
                const imageFile = imageInput.files[0];
                if (imageFile) {
                    const fileExt = imageFile.name.split('.').pop();
                    const fileName = `${Math.random()}.${fileExt}`;
                    const { data: uploadData, error: uploadError } = await supabaseClient
                        .storage
                        .from('job-images')
                        .upload(fileName, imageFile);

                    if (uploadError) throw uploadError;
                    
                    const { data: publicUrl } = supabaseClient.storage.from('job-images').getPublicUrl(fileName);
                    imageUrl = publicUrl.publicUrl;
                }

                // 2. WHATSAPP LİNKİ
                const phone = document.getElementById('phone_num').value.replace(/\D/g, '');
                const message = encodeURIComponent("Merhaba, Hablen'deki ilanınız için yazıyorum.");
                const autoLink = `https://wa.me/90${phone}?text=${message}`;

                // 3. VERİTABANINA KAYIT
                const jobData = {
                    user_id: user.id,
                    title: document.getElementById('title').value,
                    category: document.getElementById('category').value,
                    price: document.getElementById('price').value,
                    contact_link: autoLink,
                    description: document.getElementById('description').value,
                    image_url: imageUrl,
                    status: 'pending'
                };

                const { error: insertError } = await supabaseClient.from('jobs').insert([jobData]);
                if (insertError) throw insertError;

                alert("İlan başarıyla onaya gönderildi! ✨");
                window.location.href = 'profile.html';

            } catch (err) {
                alert("Hata oluştu: " + err.message);
                btn.disabled = false;
                btn.innerText = "İlanı Onaya Gönder 🚀";
            }
        });
    </script>
</body>
</html>
