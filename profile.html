<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hablen | İlanlar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0D1B2A; color: white; }
        .job-card { 
            background: #1B263B; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: all 0.3s ease;
        }
        .job-card:hover { 
            transform: translateY(-5px); 
            border-color: #3b82f6; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="p-6 flex justify-between items-center border-b border-gray-800 bg-[#0D1B2A] sticky top-0 z-50">
        <div onclick="window.location.href='profile.html'" class="text-2xl font-[900] uppercase italic tracking-tighter cursor-pointer">HABLEN</div>
        <div class="flex items-center gap-6">
            <button id="adminPanelBtn" onclick="window.location.href='admin-panel.html'" class="hidden text-[10px] font-black uppercase tracking-widest text-blue-400 hover:text-blue-300 transition">Panel</button>
            
            <button onclick="window.location.href='create-job.html'" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase italic shadow-lg shadow-blue-600/20 hover:bg-blue-500 transition">+ İlan Ver</button>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto p-6 mt-10 text-center">
        <h1 class="text-5xl md:text-7xl font-[900] uppercase italic tracking-tighter mb-8 text-white">Fırsatları <span class="text-blue-500">Yakala</span></h1>
        <div class="relative max-w-xl mx-auto">
            <input type="text" id="searchInput" placeholder="İlanlarda ara..." class="w-full bg-[#1B263B] p-5 rounded-[24px] border border-gray-800 outline-none focus:border-blue-500 transition text-sm text-white">
            <span class="absolute right-6 top-1/2 -translate-y-1/2 opacity-50 text-xl">🔍</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 mt-10">
        <div id="jobList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div id="loading" class="col-span-full text-center py-20 text-gray-500 font-bold uppercase italic animate-pulse">
                İlanlar Yükleniyor...
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://hhxhcbtahzinrbqxgusz.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_vavMMathuMNaoCi2v_epbA_P7wSnvvO';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // BURAYA KENDİ ADMİN E-POSTA ADRESİNİ YAZ
        const ADMIN_EMAIL = "frkndmr2010@gmail.com"; 

        async function checkAdmin() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user && user.email === ADMIN_EMAIL) {
                // Eğer kullanıcı admin ise butonu göster
                document.getElementById('adminPanelBtn').classList.remove('hidden');
            }
        }

        async function fetchJobs() {
            const { data: jobs, error } = await supabaseClient
                .from('jobs')
                .select('*')
                .eq('status', 'approved')
                .order('created_at', { ascending: false });

            const jobList = document.getElementById('jobList');
            jobList.innerHTML = '';

            if (error || !jobs || jobs.length === 0) {
                jobList.innerHTML = '<p class="col-span-full text-center text-gray-500 py-20 font-black italic uppercase">Henüz yayında ilan yok.</p>';
                return;
            }

            jobs.forEach(job => {
                const imageHtml = job.image_url 
                    ? `<img src="${job.image_url}" class="w-full h-48 object-cover rounded-[24px] mb-5 border border-white/5 shadow-inner">` 
                    : '';

                jobList.innerHTML += `
                    <div class="job-card p-6 rounded-[40px] flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-center mb-5">
                                <span class="bg-blue-500/10 text-blue-400 border border-blue-500/20 px-3 py-1 rounded-lg text-[9px] font-black uppercase italic tracking-widest">
                                    ${job.category}
                                </span>
                                <div class="flex items-center gap-4">
                                    <span class="text-gray-500 text-[10px] font-bold italic opacity-60">
                                        ${new Date(job.created_at).toLocaleDateString('tr-TR')}
                                    </span>
                                    <span class="text-gray-600 hover:text-red-500 transition cursor-pointer text-xs">❤️</span>
                                </div>
                            </div>
                            ${imageHtml}
                            <h3 class="text-2xl font-[900] uppercase italic leading-[0.85] mb-3 tracking-tighter text-white">
                                ${job.title}
                            </h3>
                            <p class="text-gray-400 text-xs font-medium leading-relaxed line-clamp-2 mb-6 italic">
                                ${job.description}
                            </p>
                        </div>
                        <div class="flex justify-between items-center pt-5 border-t border-white/5 mt-auto">
                            <div>
                                <p class="text-[8px] text-gray-600 font-black uppercase tracking-widest">Bütçe</p>
                                <span class="text-xl font-black italic text-white tracking-tighter">${job.price}</span>
                            </div>
                            <button onclick="window.location.href='job-details.html?id=${job.id}'" 
                                    class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase italic transition shadow-lg shadow-blue-600/10">
                                Detaylar
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // Sayfa açıldığında hem admini kontrol et hem ilanları çek
        checkAdmin();
        fetchJobs();
    </script>
</body>
</html>
