<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hablen | Profilim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0D1B2A; }
        .job-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
    </style>
</head>
<body class="text-white min-h-screen">

    <nav class="p-6 flex justify-between items-center border-b border-gray-800 bg-[#1B263B]">
        <a href="index.html" class="text-2xl font-black tracking-tighter uppercase italic hover:text-blue-400 transition cursor-pointer">
            HABLEN
        </a>
        <button id="logoutBtn" class="text-red-400 hover:text-red-500 font-bold transition text-sm">Çıkış Yap</button>
    </nav>

    <main class="max-w-4xl mx-auto p-8 mt-6">
        <div class="bg-[#1B263B] p-8 rounded-3xl shadow-2xl border border-gray-700 mb-10">
            <div class="flex items-center gap-6 mb-8">
                <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center text-3xl font-black shadow-lg uppercase" id="userInitial">?</div>
                <div>
                    <h2 class="text-2xl font-bold break-all" id="userEmail">Yükleniyor...</h2>
                    <p class="text-gray-400 font-medium">Hablen Onaylı Üye</p>
                </div>
            </div>
            <button onclick="window.location.href='test.html'" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-black text-lg transition shadow-lg transform active:scale-95">
                YETENEK TESTİNE BAŞLA
            </button>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-black uppercase tracking-tight text-blue-400">Sana Uygun İlanlar</h3>
            <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">3 Yeni İlan</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            
            <div class="job-card bg-[#1B263B] p-6 rounded-2xl border border-gray-800 transition duration-300 shadow-lg cursor-pointer">
                <div class="flex justify-between items-start mb-4">
                    <div class="w-12 h-12 bg-white rounded-lg flex items-center justify-center text-black font-bold text-xl">T</div>
                    <span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded font-bold uppercase">Uzaktan</span>
                </div>
                <h4 class="font-bold text-lg leading-tight">Junior Frontend Developer</h4>
                <p class="text-gray-400 text-sm mt-1">Tech Solutions A.Ş.</p>
                <div class="mt-4 flex items-center justify-between">
                    <span class="text-blue-400 font-bold text-sm">₺45.000 - 55.000</span>
                    <button class="text-xs font-bold border border-blue-600 px-3 py-2 rounded-lg hover:bg-blue-600 transition">İncele</button>
                </div>
            </div>

            <div class="job-card bg-[#1B263B] p-6 rounded-2xl border border-gray-800 transition duration-300 shadow-lg cursor-pointer">
                <div class="flex justify-between items-start mb-4">
                    <div class="w-12 h-12 bg-orange-500 rounded-lg flex items-center justify-center text-white font-bold text-xl">D</div>
                    <span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded font-bold uppercase">Hibrit</span>
                </div>
                <h4 class="font-bold text-lg leading-tight">UI/UX Designer</h4>
                <p class="text-gray-400 text-sm mt-1">Design Studio Pro</p>
                <div class="mt-4 flex items-center justify-between">
                    <span class="text-blue-400 font-bold text-sm">₺40.000 - 50.000</span>
                    <button class="text-xs font-bold border border-blue-600 px-3 py-2 rounded-lg hover:bg-blue-600 transition">İncele</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://hhxhcbtahzinrbqxgusz.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_vavMMathuMNaoCi2v_epbA_P7wSnvvO';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('userInitial').innerText = user.email.charAt(0);
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        });

        checkUser();
    </script>
</body>
</html>
